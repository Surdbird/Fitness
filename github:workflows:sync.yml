name: Sync Calendar

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch iCal and write events.json
        run: |
          python3 - <<'EOF'
          import urllib.request, json, re
          from datetime import datetime, timezone, timedelta

          ICAL_URL = "https://calendar.google.com/calendar/ical/sumit.nurpuri%40gmail.com/private-23166dd9b8df689e78b827312da951f0/basic.ics"
          FITNESS_RE = re.compile(r'yoga|yin|hatha|vinyasa|core|grounding|healing|dynamic|flow|pilates|llyon|train|gym|weights|functional|lift|strength|hiit|cardio|run|jog|5k|10k|marathon|sprint|reformer', re.I)
          SGT = timezone(timedelta(hours=8))

          with urllib.request.urlopen(ICAL_URL) as r:
              text = r.read().decode('utf-8')

          # Unfold lines
          text = re.sub(r'\r\n[ \t]', '', text).replace('\r', '')

          def parse_dt(s):
              s = re.sub(r'^.*?:', '', s, count=0)  # strip TZID param if present
              s = re.sub(r'TZID=[^:]+:', '', s)
              s = s.strip()
              try:
                  if 'T' in s:
                      if s.endswith('Z'):
                          dt = datetime.strptime(s, '%Y%m%dT%H%M%SZ').replace(tzinfo=timezone.utc)
                      else:
                          dt = datetime.strptime(s[:15], '%Y%m%dT%H%M%S').replace(tzinfo=SGT)
                  else:
                      dt = datetime.strptime(s[:8], '%Y%m%d').replace(tzinfo=SGT)
                  return dt.astimezone(SGT).isoformat()
              except:
                  return None

          def get_field(block, key):
              m = re.search(rf'^{key}(?:;[^:]*)?:(.+)', block, re.M)
              return m.group(1).strip() if m else ''

          def classify(s):
              s = s.lower()
              if re.search(r'yoga|yin|hatha|vinyasa|core|grounding|healing|dynamic|flow|pilates', s): return 'yoga'
              if re.search(r'run|jog|5k|10k|marathon|sprint', s): return 'run'
              if re.search(r'llyon|train|gym|weights|functional|lift|strength|hiit|cardio', s): return 'training'
              return 'other'

          def clean_summary(s):
              return re.sub(r'\s*teacher[:\s].+', '', s, flags=re.I).strip()

          def extract_teacher(s):
              m = re.search(r'teacher[:\s]+(.+)', s, re.I)
              return m.group(1).strip() if m else ''

          now = datetime.now(SGT)
          cutoff = now + timedelta(days=21)
          events = []

          for block in text.split('BEGIN:VEVENT')[1:]:
              summary_raw = get_field(block, 'SUMMARY').replace('\\,', ',')
              if not FITNESS_RE.search(summary_raw):
                  continue
              dtstart = parse_dt(get_field(block, 'DTSTART'))
              dtend   = parse_dt(get_field(block, 'DTEND') or get_field(block, 'DTSTART'))
              if not dtstart:
                  continue
              start_dt = datetime.fromisoformat(dtstart)
              if start_dt < now - timedelta(hours=1) or start_dt > cutoff:
                  continue
              location = get_field(block, 'LOCATION').replace('\\,', ',')
              location = re.sub(r'^yoga\s*[-–]\s*', '', location, flags=re.I).split(',')[0].strip()
              events.append({
                  'summary':  clean_summary(summary_raw),
                  'teacher':  extract_teacher(summary_raw),
                  'type':     classify(summary_raw),
                  'start':    dtstart,
                  'end':      dtend,
                  'location': location
              })

          events.sort(key=lambda e: e['start'])
          out = {'updated': now.isoformat(), 'events': events}
          with open('events.json', 'w') as f:
              json.dump(out, f, indent=2)
          print(f"Written {len(events)} events")
          EOF

      - name: Commit events.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git diff --cached --quiet || git commit -m "sync: update events.json"
          git push
